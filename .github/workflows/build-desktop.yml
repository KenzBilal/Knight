name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'admin-app/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin-app/package-lock.json
      - name: Install dependencies
        working-directory: admin-app
        run: npm ci
      - name: Generate icons & sounds
        working-directory: admin-app
        run: node scripts/generate-icon.cjs && node scripts/generate-sounds.cjs
      - name: Build Vite
        working-directory: admin-app
        run: npx vite build
      - name: Build Electron (AppImage + deb + rpm)
        working-directory: admin-app
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            admin-app/dist-electron/*.AppImage
            admin-app/dist-electron/*.deb
            admin-app/dist-electron/*.rpm
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin-app/package-lock.json
      - name: Install dependencies
        working-directory: admin-app
        run: npm ci
      - name: Generate icons & sounds
        working-directory: admin-app
        run: node scripts/generate-icon.cjs && node scripts/generate-sounds.cjs
      - name: Build Vite
        working-directory: admin-app
        run: npx vite build
      - name: Build Electron (DMG)
        working-directory: admin-app
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            admin-app/dist-electron/*.dmg
            admin-app/dist-electron/*.zip
          retention-days: 30

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin-app/package-lock.json
      - name: Install dependencies
        working-directory: admin-app
        run: npm ci
      - name: Generate icons & sounds
        working-directory: admin-app
        run: node scripts/generate-icon.cjs && node scripts/generate-sounds.cjs
      - name: Build Vite
        working-directory: admin-app
        run: npx vite build
      - name: Build Electron (NSIS)
        working-directory: admin-app
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: |
            admin-app/dist-electron/*.exe
          retention-days: 30

  release:
    needs: [build-linux, build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-builds/*
            artifacts/mac-builds/*
            artifacts/win-builds/*
          draft: true
          generate_release_notes: true
