services:

  # ─── Worker (Node.js) ──────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    env_file:
      - worker/.env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 60s
      timeout: 5s
      retries: 3

  # ─── Browserless (Persistent Browser Pool) ─────────────────────────────────
  browserless:
    image: browserless/chrome:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - MAX_QUEUE_LENGTH=10
      - CONNECTION_TIMEOUT=120000

  # ─── Tor Proxy (IP Rotation) ───────────────────────────────────────────────
  torproxy:
    image: dperson/torproxy
    restart: unless-stopped
    ports:
      - "9050:9050"

  # ─── SearxNG (OSINT Search) ────────────────────────────────────────────────
  searxng:
    image: searxng/searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - BASE_URL=http://localhost:8080/

volumes:
  node_modules:
